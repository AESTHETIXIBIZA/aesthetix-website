name: Lighthouse CI
on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm run build
      - uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: '.github/lighthouse/lighthouserc.json'
